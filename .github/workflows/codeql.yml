name: "CodeQL Advanced"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 18 * * 3'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: java-kotlin
            build-mode: manual

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Create mock google-services.json
        run: |
          python3 - <<'PYEOF'
          import json, os
          data = {
            "project_info": {
              "project_number": "999999999999",
              "firebase_url": "https://mock-project-default-rtdb.firebaseio.com",
              "project_id": "mock-project-id",
              "storage_bucket": "mock-project-id.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:999999999999:android:mockappid00000000",
                "android_client_info": {
                  "package_name": "com.velmorth.app"
                }
              },
              "oauth_client": [{
                "client_id": "999999999999-mock.apps.googleusercontent.com",
                "client_type": 3
              }],
              "api_key": [{
                "current_key": "mock-api-key-for-ci-only"
              }],
              "services": {
                "appinvite_service": {
                  "other_platform_oauth_client": []
                }
              }
            }],
            "configuration_version": "1"
          }
          os.makedirs("app", exist_ok=True)
          with open("app/google-services.json", "w") as f:
            json.dump(data, f, indent=2)
          print("google-services.json created successfully")
          PYEOF

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Build project for CodeQL analysis
        if: matrix.build-mode == 'manual'
        run: |
          ./gradlew compileDebugKotlin compileDebugJavaWithJavac \
            --no-daemon \
            --stacktrace \
            -Dorg.gradle.jvmargs="-Xmx4g -XX:MaxMetaspaceSize=512m" \
            2>&1 | tee build.log
          echo "Build exit code: $?"
        continue-on-error: false

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:${{matrix.language}}"
